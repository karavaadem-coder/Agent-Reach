services:
  - type: web
    name: agent-reach-api
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      pip install agent-reach
      agent-reach install --env=server --safe
    startCommand: python app.py
    healthCheckPath: /
    envVars:
      - key: RENDER
        value: "true"
      - key: TWITTER_AUTH_TOKEN
        sync: false
      - key: TWITTER_CT0
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: PORT
        value: "10000"
